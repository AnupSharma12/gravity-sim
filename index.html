<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive gravity simulator where users create objects and tune mass, size, density, volume, and gravity." />
    <meta name="keywords" content="gravity simulator, physics simulation, html canvas, mass, density, volume" />
    <meta name="author" content="Gravity Sim Team" />
    <meta name="theme-color" content="#f4f6f8" />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="Gravity Simulator" />
    <meta property="og:description" content="Build and test object physics with adjustable gravity, mass, size, density, and volume." />
    <meta property="og:type" content="website" />
    <title>Gravity Simulator</title>
    <link rel="canonical" href="/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Gravity Simulator</h1>
      <p>Project structure initialized. Build simulation UI and logic here.</p>

      <section class="sim-toolbar" aria-label="Simulation Actions">
        <button id="startBtn" class="sim-toolbar__btn" type="button">Start</button>
        <button id="pauseBtn" class="sim-toolbar__btn" type="button">Pause</button>
        <button id="resetBtn" class="sim-toolbar__btn" type="button">Reset</button>
        <button id="stepBtn" class="sim-toolbar__btn" type="button">Step</button>
        <span id="simStateLabel" class="sim-toolbar__state">State: Idle</span>
      </section>

      <section class="workspace" aria-label="Simulator Workspace">
        <section class="sim-stage" aria-label="Simulation Canvas Area">
          <div class="sim-stage__header">
            <h2>Simulation Area</h2>
            <span id="canvasSizeLabel" class="sim-stage__meta">0 x 0 px</span>
          </div>
          <canvas
            id="simCanvas"
            class="sim-stage__canvas"
            role="img"
            aria-label="Gravity simulation drawing surface"
          ></canvas>
        </section>

        <aside class="control-panel" aria-label="Object Controls">
          <h2>Object Controls</h2>

          <form class="control-form" aria-label="Create and Edit Object">
            <fieldset>
              <legend>Create Object</legend>

              <label for="shapeType">Shape</label>
              <select id="shapeType" name="shapeType">
                <option value="cube">Cube</option>
                <option value="sphere">Sphere</option>
              </select>

              <label for="massInput">Mass</label>
              <input id="massInput" name="mass" type="number" min="0" step="0.1" placeholder="10" />

              <label for="sizeInput">Size</label>
              <input id="sizeInput" name="size" type="number" min="0" step="0.1" placeholder="20" />

              <button type="button">Add Object</button>
            </fieldset>

            <fieldset>
              <legend>Edit Selected Object</legend>

              <label for="gravityInput">Gravity</label>
              <input id="gravityInput" name="gravity" type="number" step="0.1" placeholder="9.8" />

              <label for="densityInput">Density</label>
              <input id="densityInput" name="density" type="number" min="0" step="0.1" placeholder="1.0" />

              <label for="volumeInput">Volume</label>
              <input id="volumeInput" name="volume" type="number" min="0" step="0.1" placeholder="100" />

              <button type="button">Apply Changes</button>
            </fieldset>
          </form>
        </aside>
      </section>

      <section class="status-bar" aria-label="Simulation Status">
        <span class="status-item">FPS: <strong id="fpsValue">0</strong></span>
        <span class="status-item">Objects: <strong id="objectCountValue">0</strong></span>
        <span class="status-item">Gravity: <strong id="gravityValue">9.8</strong></span>
        <span class="status-item">Selected: <strong id="selectedObjectValue">None</strong></span>
      </section>

      <div id="toastArea" class="toast-area" aria-live="polite" aria-atomic="true"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
